version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - clara-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - postgres
      - redis
    env_file:
      - .env
    networks:
      - clara-net

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clara
      POSTGRES_USER: clara
      POSTGRES_PASSWORD: clara123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clara-net

  ollama:
    build:
      context: ../ollama
      dockerfile: Dockerfile
    image: clara-ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - .env
    networks:
      - clara-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass clara123
    networks:
      - clara-net

networks:
  clara-net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
