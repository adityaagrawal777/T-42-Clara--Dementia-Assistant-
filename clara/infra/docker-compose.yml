version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - clara-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    env_file:
      - .env
    networks:
      - clara-net

  ollama:
    build:
      context: ../ollama
      dockerfile: Dockerfile
    image: clara-ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - .env
    networks:
      - clara-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - clara-net

networks:
  clara-net:
    driver: bridge

volumes:
  ollama_data:
